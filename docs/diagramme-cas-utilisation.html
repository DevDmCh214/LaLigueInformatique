<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Diagramme de cas d'utilisation — La Ligue Informatique</title>
  <style>
    body { background: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; padding: 30px; }
    .actor-body { stroke: #1565c0; stroke-width: 2; fill: none; }
    .actor-head { stroke: #1565c0; stroke-width: 2; fill: none; }
    .actor-label { font-size: 13px; fill: #1565c0; font-weight: bold; }
    .uc ellipse { fill: #fef9e7; stroke: #222; stroke-width: 1.5; }
    .uc text { font-size: 12px; fill: #222; }
    .link { stroke: #222; stroke-width: 1.2; fill: none; }
    .link-extend { stroke: #888; stroke-width: 1; fill: none; stroke-dasharray: 6,3; }
    .link-include { stroke: #888; stroke-width: 1; fill: none; stroke-dasharray: 6,3; }
    .stereo { font-size: 10px; fill: #888; font-style: italic; }
    .box { fill: none; stroke: #bbb; stroke-width: 1; stroke-dasharray: 5,3; rx: 8; }
    .box-label { font-size: 14px; fill: #999; font-weight: bold; }
    .title-text { font-size: 20px; font-weight: bold; fill: #1565c0; }
    .subtitle-text { font-size: 13px; fill: #666; }
  </style>
</head>
<body>
<svg width="920" height="680" viewBox="0 0 920 680" xmlns="http://www.w3.org/2000/svg">

  <!-- Titre -->
  <text x="460" y="30" text-anchor="middle" class="title-text">Diagramme de cas d'utilisation</text>
  <text x="460" y="50" text-anchor="middle" class="subtitle-text">La Ligue Informatique — Gestion d'équipes sportives</text>

  <!-- Cadre système -->
  <rect x="200" y="65" width="560" height="590" class="box" rx="10"/>
  <text x="480" y="88" text-anchor="middle" class="box-label">Système — La Ligue Informatique</text>

  <!-- ══════════ ACTEUR : Visiteur ══════════ -->
  <g transform="translate(70, 130)">
    <circle cx="30" cy="12" r="12" class="actor-head"/>
    <line x1="30" y1="24" x2="30" y2="55" class="actor-body"/>
    <line x1="10" y1="38" x2="50" y2="38" class="actor-body"/>
    <line x1="30" y1="55" x2="12" y2="78" class="actor-body"/>
    <line x1="30" y1="55" x2="48" y2="78" class="actor-body"/>
    <text x="30" y="96" text-anchor="middle" class="actor-label">Visiteur</text>
  </g>

  <!-- ══════════ ACTEUR : Membre ══════════ -->
  <g transform="translate(70, 330)">
    <circle cx="30" cy="12" r="12" class="actor-head"/>
    <line x1="30" y1="24" x2="30" y2="55" class="actor-body"/>
    <line x1="10" y1="38" x2="50" y2="38" class="actor-body"/>
    <line x1="30" y1="55" x2="12" y2="78" class="actor-body"/>
    <line x1="30" y1="55" x2="48" y2="78" class="actor-body"/>
    <text x="30" y="96" text-anchor="middle" class="actor-label">Membre</text>
  </g>

  <!-- ══════════ ACTEUR : Admin ══════════ -->
  <g transform="translate(70, 530)">
    <circle cx="30" cy="12" r="12" class="actor-head"/>
    <line x1="30" y1="24" x2="30" y2="55" class="actor-body"/>
    <line x1="10" y1="38" x2="50" y2="38" class="actor-body"/>
    <line x1="30" y1="55" x2="12" y2="78" class="actor-body"/>
    <line x1="30" y1="55" x2="48" y2="78" class="actor-body"/>
    <text x="30" y="96" text-anchor="middle" class="actor-label">Admin</text>
  </g>

  <!-- Héritage Visiteur → Membre -->
  <line x1="100" y1="226" x2="100" y2="330" class="link"/>
  <polygon points="92,330 108,330 100,315" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>

  <!-- Héritage Membre → Admin -->
  <line x1="100" y1="426" x2="100" y2="530" class="link"/>
  <polygon points="92,530 108,530 100,515" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>

  <!-- ══════════════════════════════════════ -->
  <!-- CAS D'UTILISATION — Visiteur          -->
  <!-- ══════════════════════════════════════ -->

  <!-- UC1 : Créer un compte -->
  <g class="uc" transform="translate(300, 105)">
    <ellipse cx="110" cy="22" rx="110" ry="22"/>
    <text x="110" y="27" text-anchor="middle">Créer un compte</text>
  </g>
  <line x1="120" y1="170" x2="300" y2="127" class="link"/>

  <!-- UC2 : Se connecter -->
  <g class="uc" transform="translate(300, 165)">
    <ellipse cx="110" cy="22" rx="110" ry="22"/>
    <text x="110" y="27" text-anchor="middle">Se connecter</text>
  </g>
  <line x1="120" y1="180" x2="300" y2="187" class="link"/>

  <!-- ══════════════════════════════════════ -->
  <!-- CAS D'UTILISATION — Membre            -->
  <!-- ══════════════════════════════════════ -->

  <!-- UC3 : Consulter le tableau de bord -->
  <g class="uc" transform="translate(260, 270)">
    <ellipse cx="140" cy="22" rx="140" ry="22"/>
    <text x="140" y="27" text-anchor="middle">Consulter le tableau de bord</text>
  </g>
  <line x1="120" y1="370" x2="270" y2="292" class="link"/>

  <!-- UC4 : Consulter les joueurs d'une équipe -->
  <g class="uc" transform="translate(530, 270)">
    <ellipse cx="150" cy="22" rx="150" ry="22"/>
    <text x="150" y="27" text-anchor="middle">Consulter les joueurs d'une équipe</text>
  </g>
  <line x1="120" y1="375" x2="540" y2="292" class="link"/>

  <!-- UC5 : Consulter le calendrier -->
  <g class="uc" transform="translate(260, 330)">
    <ellipse cx="130" cy="22" rx="130" ry="22"/>
    <text x="130" y="27" text-anchor="middle">Consulter le calendrier</text>
  </g>
  <line x1="120" y1="380" x2="270" y2="352" class="link"/>

  <!-- UC6 : Répondre à un événement (RSVP) -->
  <g class="uc" transform="translate(510, 330)">
    <ellipse cx="155" cy="22" rx="155" ry="22"/>
    <text x="155" y="27" text-anchor="middle">Répondre à un événement (RSVP)</text>
  </g>
  <line x1="120" y1="385" x2="520" y2="352" class="link"/>

  <!-- UC7 : Consulter les événements -->
  <g class="uc" transform="translate(300, 390)">
    <ellipse cx="130" cy="22" rx="130" ry="22"/>
    <text x="130" y="27" text-anchor="middle">Consulter les événements</text>
  </g>
  <line x1="120" y1="395" x2="300" y2="412" class="link"/>

  <!-- ══════════════════════════════════════ -->
  <!-- CAS D'UTILISATION — Admin             -->
  <!-- ══════════════════════════════════════ -->

  <!-- UC8 : Créer / Modifier / Supprimer une équipe -->
  <g class="uc" transform="translate(240, 475)">
    <ellipse cx="160" cy="22" rx="160" ry="22"/>
    <text x="160" y="27" text-anchor="middle">Créer / Modifier / Supprimer une équipe</text>
  </g>
  <line x1="120" y1="570" x2="250" y2="497" class="link"/>

  <!-- UC9 : Ajouter / Modifier / Supprimer un joueur -->
  <g class="uc" transform="translate(240, 535)">
    <ellipse cx="165" cy="22" rx="165" ry="22"/>
    <text x="165" y="27" text-anchor="middle">Ajouter / Modifier / Supprimer un joueur</text>
  </g>
  <line x1="120" y1="578" x2="248" y2="557" class="link"/>

  <!-- UC10 : Créer / Modifier / Supprimer un événement -->
  <g class="uc" transform="translate(240, 595)">
    <ellipse cx="170" cy="22" rx="170" ry="22"/>
    <text x="170" y="27" text-anchor="middle">Créer / Modifier / Supprimer un événement</text>
  </g>
  <line x1="120" y1="585" x2="250" y2="617" class="link"/>

  <!-- ═══ Lien «include» : Consulter événements → Consulter calendrier ═══ -->
  <line x1="420" y1="400" x2="530" y2="355" class="link-include"/>
  <text x="490" y="372" class="stereo">«include»</text>

  <!-- ═══ Lien «extend» : Consulter joueurs ← Consulter tableau de bord ═══ -->
  <line x1="530" y1="280" x2="400" y2="285" class="link-extend"/>
  <text x="445" y="270" class="stereo">«extend»</text>

</svg>
</body>
</html>
