<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MCD — La Ligue Informatique</title>
  <style>
    body { background: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; padding: 30px; }
    svg { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08)); }
    .entity rect { fill: #fff; stroke: #222; stroke-width: 2; }
    .entity-title { font-weight: bold; font-size: 14px; fill: #111; }
    .entity-attr { font-size: 12px; fill: #333; }
    .pk { text-decoration: underline; }
    .assoc ellipse { fill: #fff; stroke: #222; stroke-width: 2; }
    .assoc-title { font-weight: bold; font-size: 12px; fill: #111; }
    .assoc-attr { font-size: 11px; fill: #555; font-style: italic; }
    .card { font-size: 12px; fill: #d32f2f; font-weight: bold; }
    .line { stroke: #222; stroke-width: 1.5; fill: none; }
    .title-text { font-size: 20px; font-weight: bold; fill: #1565c0; }
    .subtitle-text { font-size: 13px; fill: #666; }
  </style>
</head>
<body>
<svg width="880" height="680" viewBox="0 0 880 680" xmlns="http://www.w3.org/2000/svg">

  <!-- Titre -->
  <text x="440" y="30" text-anchor="middle" class="title-text">Modèle Conceptuel de Données (MCD)</text>
  <text x="440" y="50" text-anchor="middle" class="subtitle-text">La Ligue Informatique — Gestion d'équipes sportives</text>

  <!-- ══════════ ENTITÉ : USER ══════════ -->
  <g class="entity" transform="translate(50, 80)">
    <rect x="0" y="0" width="180" height="130" rx="2"/>
    <line x1="0" y1="28" x2="180" y2="28" stroke="#222" stroke-width="1.5"/>
    <text x="90" y="20" text-anchor="middle" class="entity-title">USER</text>
    <text x="10" y="48" class="entity-attr pk">id</text>
    <text x="10" y="66" class="entity-attr">email</text>
    <text x="10" y="84" class="entity-attr">password</text>
    <text x="10" y="102" class="entity-attr">name</text>
    <text x="10" y="120" class="entity-attr">createdAt</text>
  </g>

  <!-- ══════════ ENTITÉ : TEAM ══════════ -->
  <g class="entity" transform="translate(600, 80)">
    <rect x="0" y="0" width="180" height="110" rx="2"/>
    <line x1="0" y1="28" x2="180" y2="28" stroke="#222" stroke-width="1.5"/>
    <text x="90" y="20" text-anchor="middle" class="entity-title">TEAM</text>
    <text x="10" y="48" class="entity-attr pk">id</text>
    <text x="10" y="66" class="entity-attr">name</text>
    <text x="10" y="84" class="entity-attr">sport</text>
    <text x="10" y="102" class="entity-attr">createdAt</text>
  </g>

  <!-- ══════════ ENTITÉ : PLAYER ══════════ -->
  <g class="entity" transform="translate(600, 430)">
    <rect x="0" y="0" width="180" height="150" rx="2"/>
    <line x1="0" y1="28" x2="180" y2="28" stroke="#222" stroke-width="1.5"/>
    <text x="90" y="20" text-anchor="middle" class="entity-title">PLAYER</text>
    <text x="10" y="48" class="entity-attr pk">id</text>
    <text x="10" y="66" class="entity-attr">firstName</text>
    <text x="10" y="84" class="entity-attr">lastName</text>
    <text x="10" y="102" class="entity-attr">position</text>
    <text x="10" y="120" class="entity-attr">email</text>
    <text x="10" y="138" class="entity-attr">phone</text>
  </g>

  <!-- ══════════ ENTITÉ : EVENT ══════════ -->
  <g class="entity" transform="translate(50, 430)">
    <rect x="0" y="0" width="180" height="170" rx="2"/>
    <line x1="0" y1="28" x2="180" y2="28" stroke="#222" stroke-width="1.5"/>
    <text x="90" y="20" text-anchor="middle" class="entity-title">EVENT</text>
    <text x="10" y="48" class="entity-attr pk">id</text>
    <text x="10" y="66" class="entity-attr">title</text>
    <text x="10" y="84" class="entity-attr">type</text>
    <text x="10" y="102" class="entity-attr">date</text>
    <text x="10" y="120" class="entity-attr">location</text>
    <text x="10" y="138" class="entity-attr">opponent</text>
    <text x="10" y="156" class="entity-attr">description</text>
  </g>

  <!-- ══════════ ASSOCIATION : TeamMember (User ↔ Team) — N,N porteuse ══════════ -->
  <g class="assoc" transform="translate(370, 105)">
    <ellipse cx="70" cy="30" rx="80" ry="30"/>
    <text x="70" y="28" text-anchor="middle" class="assoc-title">Être membre</text>
    <text x="70" y="44" text-anchor="middle" class="assoc-attr">rôle</text>
  </g>
  <!-- Lignes User → TeamMember -->
  <line x1="230" y1="145" x2="292" y2="135" class="line"/>
  <text x="260" y="128" class="card">1,n</text>
  <!-- Lignes TeamMember → Team -->
  <line x1="518" y1="135" x2="600" y2="145" class="line"/>
  <text x="558" y="128" class="card">1,n</text>

  <!-- ══════════ ASSOCIATION : RSVP (User ↔ Event) — N,N porteuse ══════════ -->
  <g class="assoc" transform="translate(50, 280)">
    <ellipse cx="90" cy="30" rx="90" ry="30"/>
    <text x="90" y="28" text-anchor="middle" class="assoc-title">Répondre (RSVP)</text>
    <text x="90" y="44" text-anchor="middle" class="assoc-attr">statut</text>
  </g>
  <!-- Lignes User → RSVP -->
  <line x1="140" y1="210" x2="140" y2="252" class="line"/>
  <text x="148" y="240" class="card">1,n</text>
  <!-- Lignes RSVP → Event -->
  <line x1="140" y1="338" x2="140" y2="430" class="line"/>
  <text x="148" y="380" class="card">1,n</text>

  <!-- ══════════ ASSOCIATION : Appartenir (Team → Player) — 1,N ══════════ -->
  <g class="assoc" transform="translate(600, 300)">
    <ellipse cx="90" cy="28" rx="80" ry="28"/>
    <text x="90" y="33" text-anchor="middle" class="assoc-title">Avoir joueur</text>
  </g>
  <!-- Lignes Team → Appartenir -->
  <line x1="690" y1="190" x2="690" y2="274" class="line"/>
  <text x="698" y="240" class="card">1,n</text>
  <!-- Lignes Appartenir → Player -->
  <line x1="690" y1="356" x2="690" y2="430" class="line"/>
  <text x="698" y="400" class="card">1,1</text>

  <!-- ══════════ ASSOCIATION : Organiser (Team → Event) — 1,N ══════════ -->
  <g class="assoc" transform="translate(310, 430)">
    <ellipse cx="70" cy="28" rx="72" ry="28"/>
    <text x="70" y="33" text-anchor="middle" class="assoc-title">Organiser</text>
  </g>
  <!-- Lignes Team → Organiser (vient du bas de Team) -->
  <line x1="600" y1="185" x2="520" y2="280" class="line" stroke-dasharray="none"/>
  <path d="M 520 280 Q 450 380 448 430" class="line" fill="none"/>
  <text x="530" y="310" class="card">1,n</text>
  <!-- Lignes Organiser → Event -->
  <line x1="310" y1="458" x2="230" y2="458" class="line"/>
  <text x="248" y="450" class="card">1,1</text>

  <!-- Légende -->
  <g transform="translate(20, 630)">
    <text x="0" y="15" style="font-size:12px; fill:#555; font-weight:bold;">Légende :</text>
    <rect x="90" y="2" width="22" height="16" fill="#fff" stroke="#222" stroke-width="1.5" rx="1"/>
    <text x="120" y="15" style="font-size:11px; fill:#555;"> Entité</text>
    <ellipse cx="210" cy="10" rx="18" ry="10" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <text x="235" y="15" style="font-size:11px; fill:#555;"> Association</text>
    <text x="340" y="15" style="font-size:11px; fill:#d32f2f; font-weight:bold;">1,n</text>
    <text x="365" y="15" style="font-size:11px; fill:#555;"> Cardinalité</text>
    <text x="460" y="15" style="font-size:11px; fill:#555; text-decoration:underline;">id</text>
    <text x="475" y="15" style="font-size:11px; fill:#555;"> Clé primaire</text>
    <text x="580" y="15" style="font-size:11px; fill:#555; font-style:italic;">rôle, statut</text>
    <text x="660" y="15" style="font-size:11px; fill:#555;"> Données portées</text>
  </g>

</svg>
</body>
</html>
